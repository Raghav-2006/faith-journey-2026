<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My 4-Month Faith Journey · May – August 2026</title>
  <meta name="description" content="A quiet place to walk with God for four months." />

  <!-- Fonts: Poppins (body) + Playfair Display (display/serif) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // =====================================================================
    //  THEME CONFIGURATION
    // =====================================================================
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'Inter', 'system-ui', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
          },
          colors: {
            cream:      '#FAF9F6',
            'cream-2':  '#FDFBF7',
            'cream-3':  '#F5F1E8',
            sky:        '#A5D6FF',
            sage:       '#B2D8C8',
            peach:      '#F8C4B8',
            lavender:   '#D4C5E8',
            ink:        '#3A3A3A',
            'ink-2':    '#6B6B6B',
            'ink-3':    '#9A9A9A',
          },
          boxShadow: {
            soft:       '0 4px 20px rgba(60, 60, 60, 0.05)',
            'soft-lg':  '0 10px 40px rgba(60, 60, 60, 0.08)',
            'soft-xl':  '0 20px 60px rgba(60, 60, 60, 0.10)',
          },
        },
      },
    };
  </script>

  <style>
    /* =====================================================================
       BASE
       ===================================================================== */
    html { scroll-behavior: smooth; }
    body {
      background-color: #FAF9F6;
      background-image:
        radial-gradient(circle at 15% 10%, rgba(165, 214, 255, 0.18) 0, transparent 45%),
        radial-gradient(circle at 85% 0%,  rgba(212, 197, 232, 0.16) 0, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(178, 216, 200, 0.18) 0, transparent 45%),
        radial-gradient(circle at 10% 95%, rgba(248, 196, 184, 0.14) 0, transparent 45%);
      color: #3A3A3A;
      font-family: 'Poppins', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Soft scrollbar */
    ::-webkit-scrollbar          { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track    { background: transparent; }
    ::-webkit-scrollbar-thumb    { background: rgba(165, 214, 255, 0.35); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(165, 214, 255, 0.55); }

    /* =====================================================================
       3D FLIP CARD
       ===================================================================== */
    .flip-card {
      perspective: 1600px;
      width: 100%;
      height: min(620px, 82vh);      /* fallback for older browsers */
      height: min(620px, 82dvh);     /* preferred: matches visible viewport */
      flex-shrink: 0;                /* never let flex parent squash the card */
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      transform-origin: center center;
      will-change: transform;
    }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      overflow: hidden;              /* faces never scroll themselves */
      border-radius: 28px;
      transform: translateZ(0);      /* own GPU layer, stops sub-pixel shift */
    }
    .flip-card-back { transform: rotateY(180deg) translateZ(0); }
    .flip-card-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;              /* content scrolls inside the face */
      overscroll-behavior: contain;
      scroll-behavior: auto;         /* no smooth auto-scroll on focus */
    }
    .flip-card-footer { flex: 0 0 auto; }

    /* =====================================================================
       ANIMATIONS
       ===================================================================== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.55s cubic-bezier(0.4, 0, 0.2, 1) both; }

    @keyframes modalEnter {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    .modal-enter { animation: modalEnter 0.35s cubic-bezier(0.4, 0, 0.2, 1) both; }

    @keyframes backdropFade {
      from { opacity: 0; } to { opacity: 1; }
    }
    .backdrop-fade { animation: backdropFade 0.3s ease-out; }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    .floaty { animation: floaty 4s ease-in-out infinite; }

    @keyframes pulseDot {
      0%   { box-shadow: 0 0 0 0   rgba(165, 214, 255, 0.7); }
      70%  { box-shadow: 0 0 0 8px rgba(165, 214, 255, 0);   }
      100% { box-shadow: 0 0 0 0   rgba(165, 214, 255, 0);   }
    }
    .pulse-dot { animation: pulseDot 1.6s ease-out infinite; }

    .updates-collapsed { max-height: 0; overflow: hidden; }
    .updates-expanded  { max-height: 1200px; }
    .updates-body { transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

    /* =====================================================================
       COMPONENTS
       ===================================================================== */
    .month-card {
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .month-card:hover {
      transform: translateY(-6px);
    }

    .day-cell {
      transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      aspect-ratio: 1 / 1;
    }
    .day-cell:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 20px rgba(165, 214, 255, 0.25);
    }
    .day-cell.has-entry {
      background: linear-gradient(135deg, rgba(165, 214, 255, 0.22) 0%, rgba(178, 216, 200, 0.22) 100%);
    }
    .day-cell.is-today {
      outline: 2px solid rgba(165, 214, 255, 0.7);
      outline-offset: 2px;
    }

    .mini-day { aspect-ratio: 1 / 1; }

    .progress-bar-fill { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .progress-ring     { transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

    /* Subtle divider flourish */
    .flourish {
      display: inline-flex; align-items: center; gap: 10px;
      color: #B0A99A;
    }
    .flourish::before, .flourish::after {
      content: ""; display: block; width: 28px; height: 1px;
      background: linear-gradient(to right, transparent, #C9C3B5, transparent);
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- =================================================================
       HEADER
       ================================================================= -->
  <header class="sticky top-0 z-40 backdrop-blur-lg bg-cream/70 border-b border-white/70">
    <div class="max-w-6xl mx-auto px-5 md:px-8 py-4 md:py-5 flex items-center justify-between gap-4 flex-wrap">
      <!-- Left: logo + title -->
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 md:w-12 md:h-12 rounded-2xl bg-gradient-to-br from-sky to-lavender/90 flex items-center justify-center shadow-soft floaty">
          <!-- Clean Christian cross icon -->
          <svg class="w-5 h-5 md:w-6 md:h-6 text-white" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M10.5 2h3v5H19v3h-5.5v12h-3V10H5V7h5.5V2z"/>
          </svg>
        </div>
        <div class="leading-tight">
          <h1 class="font-serif text-[1.15rem] md:text-2xl font-semibold text-ink tracking-tight">
            My 4-Month Faith Journey
          </h1>
          <p class="text-[11px] md:text-sm text-ink-2 font-light mt-0.5">
            May – August 2026
          </p>
        </div>
      </div>

      <!-- Right: overall progress -->
      <div class="flex items-center gap-3 bg-white/80 rounded-2xl px-4 py-2.5 shadow-soft border border-white">
        <div class="flex flex-col items-end">
          <span class="text-[10px] md:text-[11px] text-ink-3 font-light uppercase tracking-widest">Progress</span>
          <span id="overallProgress" class="text-[13px] md:text-sm font-semibold text-ink">0/123 days</span>
        </div>
        <div class="w-11 h-11 md:w-12 md:h-12 relative">
          <svg class="w-full h-full -rotate-90" viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="20" stroke="#EFEADD" stroke-width="4" fill="none"/>
            <circle
              id="progressCircle"
              cx="24" cy="24" r="20"
              stroke="url(#progressGrad)"
              stroke-width="4"
              fill="none"
              stroke-linecap="round"
              stroke-dasharray="125.66"
              stroke-dashoffset="125.66"
              class="progress-ring"
            />
            <defs>
              <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"  stop-color="#A5D6FF"/>
                <stop offset="100%" stop-color="#B2D8C8"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center">
            <span id="progressPercent" class="text-[10px] md:text-[11px] font-semibold text-ink-2">0%</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- =================================================================
       MAIN
       ================================================================= -->
  <main class="max-w-6xl mx-auto px-5 md:px-8 py-10 md:py-14">

    <!-- =========================
         HOME VIEW — Month grid
         ========================= -->
    <section id="homeView" class="fade-in-up">
      <!-- What's new panel -->
      <div id="updatesPanel" class="mb-6 md:mb-8"></div>

      <!-- Reading plan / expected timeline -->
      <div id="readingPlanPanel" class="mb-6 md:mb-8"></div>

      <!-- Diary -->
      <div id="diaryPanel" class="mb-8 md:mb-10"></div>

      <!-- Month cards -->
      <div id="monthGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 md:gap-6"></div>
    </section>

    <!-- =========================
         CALENDAR VIEW — One month
         ========================= -->
    <section id="calendarView" class="hidden fade-in-up">
      <div class="flex items-center justify-between mb-6 md:mb-8">
        <button
          onclick="showHome()"
          class="flex items-center gap-2 text-ink-2 hover:text-ink transition-colors group"
        >
          <span class="w-9 h-9 rounded-full bg-white/80 group-hover:bg-white flex items-center justify-center shadow-soft border border-white">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
          </span>
          <span class="text-sm">All months</span>
        </button>
        <span id="calMonthProgress" class="text-xs md:text-sm text-ink-2"></span>
      </div>

      <div class="bg-white/75 backdrop-blur-sm rounded-[28px] p-6 md:p-10 shadow-soft-lg border border-white">
        <div class="text-center mb-8 md:mb-10">
          <p id="calMonthEyebrow" class="text-[11px] uppercase tracking-[0.3em] text-ink-3 mb-2"></p>
          <h2 id="calMonthTitle" class="font-serif text-4xl md:text-5xl font-semibold text-ink"></h2>
          <p class="text-xs md:text-sm text-ink-2 mt-3 font-light">
            Tap any day to open its flashcard
          </p>
        </div>

        <!-- Weekday labels -->
        <div class="grid grid-cols-7 gap-1.5 md:gap-3 mb-2">
          <div class="text-center text-[10px] md:text-xs font-medium text-ink-3 py-2 uppercase tracking-widest">Sun</div>
          <div class="text-center text-[10px] md:text-xs font-medium text-ink-3 py-2 uppercase tracking-widest">Mon</div>
          <div class="text-center text-[10px] md:text-xs font-medium text-ink-3 py-2 uppercase tracking-widest">Tue</div>
          <div class="text-center text-[10px] md:text-xs font-medium text-ink-3 py-2 uppercase tracking-widest">Wed</div>
          <div class="text-center text-[10px] md:text-xs font-medium text-ink-3 py-2 uppercase tracking-widest">Thu</div>
          <div class="text-center text-[10px] md:text-xs font-medium text-ink-3 py-2 uppercase tracking-widest">Fri</div>
          <div class="text-center text-[10px] md:text-xs font-medium text-ink-3 py-2 uppercase tracking-widest">Sat</div>
        </div>

        <!-- Calendar grid -->
        <div id="calendarGrid" class="grid grid-cols-7 gap-1.5 md:gap-3"></div>

        <!-- Legend -->
        <div class="flex items-center justify-center gap-6 mt-8 text-[11px] text-ink-3">
          <span class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-gradient-to-br from-sky to-sage"></span>
            Updated
          </span>
          <span class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full border border-ink-3/50"></span>
            Not yet
          </span>
        </div>
      </div>
    </section>
  </main>

  <!-- =================================================================
       FLASHCARD MODAL
       ================================================================= -->
  <div
    id="modalBackdrop"
    class="hidden fixed inset-0 z-50 bg-ink/25 backdrop-blur-md p-4 md:p-8 overflow-y-auto backdrop-fade"
    onclick="closeModalBackdrop(event)"
  >
    <!-- Grid cell that always vertically centers the card, even with scroll -->
    <div class="min-h-full grid place-items-center">
    <div class="modal-enter w-full max-w-2xl">
    <div class="flip-card" id="flipCard">
      <div class="flip-card-inner">

        <!-- ============ FRONT ============ -->
        <div class="flip-card-face bg-cream-2 shadow-soft-xl border border-white relative">
          <!-- Close -->
          <button
            type="button"
            onclick="closeModal()"
            aria-label="Close"
            class="absolute top-5 right-5 z-10 w-10 h-10 rounded-full bg-white/90 hover:bg-white flex items-center justify-center text-ink-2 hover:text-ink transition-all shadow-soft border border-white"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>

          <!-- Scrollable body -->
          <div class="flip-card-body px-8 pt-8 md:px-10 md:pt-10">
            <!-- Date -->
            <div class="mb-6 md:mb-7">
              <p id="modalDayName" class="text-[11px] text-ink-3 uppercase tracking-[0.3em]"></p>
              <h2 id="modalDate" class="font-serif text-4xl md:text-5xl font-semibold text-ink mt-1 leading-tight"></h2>
            </div>

            <!-- Status -->
            <div id="modalStatus" class="inline-block mb-6 px-3 py-1 text-[11px] rounded-full bg-peach/40 text-ink-2 tracking-wide">
              Not updated yet
            </div>

            <!-- What I Did -->
            <div class="mb-6">
              <h3 class="text-[13px] font-semibold text-ink flex items-center gap-2 mb-2.5 tracking-wide">
                <span class="w-6 h-6 rounded-lg bg-sage/55 flex items-center justify-center text-ink/80">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.09 6.26L20 9.27l-4.91 3.57L16.18 19 12 15.77 7.82 19l1.09-6.16L4 9.27l5.91-1.01L12 2z"/></svg>
                </span>
                What I Did
              </h3>
              <p id="modalWhatIDid" class="text-ink-2 leading-relaxed pl-8 text-[15px] whitespace-pre-line">—</p>
            </div>

            <!-- What I Learned -->
            <div class="mb-2">
              <h3 class="text-[13px] font-semibold text-ink flex items-center gap-2 mb-2.5 tracking-wide">
                <span class="w-6 h-6 rounded-lg bg-sky/55 flex items-center justify-center text-ink/80">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M10.5 2h3v5H19v3h-5.5v12h-3V10H5V7h5.5V2z"/></svg>
                </span>
                What I Learned
              </h3>
              <p id="modalWhatILearned" class="text-ink-2 leading-relaxed pl-8 text-[15px] whitespace-pre-line">—</p>
            </div>
          </div>

          <!-- Pinned footer with flip button -->
          <div class="flip-card-footer px-8 pb-8 pt-4 md:px-10 md:pb-10 bg-gradient-to-t from-cream-2 via-cream-2 to-transparent">
            <button
              type="button"
              onmousedown="event.preventDefault()"
              onclick="flipCard(event)"
              class="w-full py-3.5 rounded-2xl bg-gradient-to-r from-sky to-sage text-white font-medium shadow-soft hover:shadow-soft-lg transition-all flex items-center justify-center gap-2 text-sm"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0114.85-3.36L20 7M20 15a9 9 0 01-14.85 3.36L4 17"/>
              </svg>
              Flip to see photo
            </button>
          </div>
        </div>

        <!-- ============ BACK ============ -->
        <div class="flip-card-face flip-card-back bg-cream-2 shadow-soft-xl border border-white relative">
          <button
            type="button"
            onclick="closeModal()"
            aria-label="Close"
            class="absolute top-5 right-5 z-20 w-10 h-10 rounded-full bg-white/90 hover:bg-white flex items-center justify-center text-ink-2 hover:text-ink transition-all shadow-soft border border-white"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>

          <!-- Photo (FIXED at the top, always visible) -->
          <div class="flex-shrink-0 px-7 pt-7 md:px-10 md:pt-10">
            <div
              id="modalPhotoContainer"
              class="relative rounded-2xl overflow-hidden bg-gradient-to-br from-sky/20 to-lavender/20 aspect-[16/10] border border-white"
            >
              <!-- Empty state -->
              <div id="modalPhotoPlaceholder" class="absolute inset-0 flex items-center justify-center text-center px-6">
                <div>
                  <div class="w-14 h-14 rounded-2xl bg-white/70 mx-auto flex items-center justify-center mb-3 shadow-soft">
                    <svg class="w-6 h-6 text-ink-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                  </div>
                  <p class="text-xs text-ink-2">No photo yet</p>
                </div>
              </div>

              <!-- Active photo -->
              <img id="modalPhoto" class="hidden absolute inset-0 w-full h-full object-cover transition-opacity duration-200" alt="" />

              <!-- Carousel controls (only shown when more than one photo) -->
              <button
                id="modalPhotoPrev" type="button"
                onmousedown="event.preventDefault()"
                onclick="modalPhotoNav(-1)"
                aria-label="Previous photo"
                class="hidden absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-white/85 hover:bg-white items-center justify-center text-ink shadow-soft"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
              </button>
              <button
                id="modalPhotoNext" type="button"
                onmousedown="event.preventDefault()"
                onclick="modalPhotoNav(1)"
                aria-label="Next photo"
                class="hidden absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-white/85 hover:bg-white items-center justify-center text-ink shadow-soft"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
              </button>

              <!-- Counter pill -->
              <div id="modalPhotoCount" class="hidden absolute top-2 right-2 px-2 py-0.5 rounded-full bg-ink/40 text-white text-[10px] tracking-wide backdrop-blur-sm"></div>

              <!-- Dot indicators -->
              <div id="modalPhotoDots" class="hidden absolute bottom-2 left-1/2 -translate-x-1/2 gap-1.5 items-center"></div>
            </div>
          </div>

          <!-- Note (scrollable middle) -->
          <div class="flip-card-body px-7 md:px-10 pt-5">
            <div class="mb-2">
              <h3 class="text-[13px] font-semibold text-ink flex items-center gap-2 mb-2.5 tracking-wide">
                <span class="w-6 h-6 rounded-lg bg-peach/55 flex items-center justify-center text-ink/80">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-7-10a5 5 0 019-3 5 5 0 019 3c0 5.65-7 10-7 10h-4z" opacity=".35"/><path d="M12 21s-7-4.35-7-10a5 5 0 019-3 5 5 0 019 3c0 5.65-7 10-7 10h-4z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
                </span>
                A Little Note
              </h3>
              <p id="modalNote" class="text-ink-2 leading-relaxed italic pl-8 text-[15px] whitespace-pre-line">—</p>
            </div>
          </div>

          <!-- Pinned footer -->
          <div class="flip-card-footer px-7 pb-7 pt-3 md:px-10 md:pb-10 bg-gradient-to-t from-cream-2 via-cream-2 to-transparent">
            <button
              type="button"
              onmousedown="event.preventDefault()"
              onclick="flipCard(event)"
              class="w-full py-3.5 rounded-2xl bg-white/90 hover:bg-white text-ink font-medium shadow-soft transition-all flex items-center justify-center gap-2 text-sm border border-cream-3"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0114.85-3.36L20 7M20 15a9 9 0 01-14.85 3.36L4 17"/>
              </svg>
              Back to entry
            </button>
          </div>
        </div>
      </div>
    </div>
    </div>
    </div>
  </div>

  <!-- =================================================================
       DIARY MODAL
       ================================================================= -->
  <div
    id="diaryModalBackdrop"
    class="hidden fixed inset-0 z-50 bg-ink/25 backdrop-blur-md p-4 md:p-8 overflow-y-auto backdrop-fade"
    onclick="closeDiaryBackdrop(event)"
  >

    };
    const formatDateChip = (key) => {
      const [y, mo, d] = key.split('-').map(Number);
      return `${MONTH_NAMES[mo - 1].slice(0, 3)} ${d}`;
    };

    let updatesExpanded = false;

    function renderUpdatesPanel() {
      const panel = document.getElementById('updatesPanel');
      if (!updates || updates.length === 0) { panel.innerHTML = ''; return; }

      // Newest first by pushedAt, then by array order for ties.
      const sorted = [...updates].sort((a, b) => (a.pushedAt < b.pushedAt ? 1 : -1));
      const seen    = getSeenUpdateIds();
      const unseen  = sorted.filter((u) => !seen.has(u.id));
      const hasNew  = unseen.length > 0;
      const latest  = sorted[0];
      const rest    = sorted.slice(1);

      const renderChips = (u) => u.dates.map((key) => {
        const locked = isLocked(key);
        const filled = hasEntry(key);
        const base = 'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] transition-all';
        if (locked) {
          return `<span class="${base} bg-white/60 text-ink-3 border border-dashed border-ink-3/30" title="Unavailable">${formatDateChip(key)}</span>`;
        }
        const tone = filled
          ? 'bg-gradient-to-r from-sky/25 to-sage/25 text-ink border border-white hover:from-sky/35 hover:to-sage/35'
          : 'bg-white/80 text-ink-2 border border-white hover:bg-white';
        return `
          <button
            type="button"
            onclick="openDay('${key}')"
            class="${base} ${tone} shadow-soft"
          >${formatDateChip(key)}</button>
        `;
      }).join('');

      const renderRow = (u, idx) => {
        const isUnseen = !seen.has(u.id);
        return `
          <div class="flex items-start gap-3 ${idx > 0 ? 'pt-4 mt-4 border-t border-cream-3/50' : ''}">
            <div class="mt-1 relative">
              <span class="block w-2 h-2 rounded-full ${isUnseen ? 'bg-sky pulse-dot' : 'bg-ink-3/40'}"></span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="text-[11px] uppercase tracking-[0.2em] text-ink-3">${formatPushedAt(u.pushedAt)}</span>
                ${isUnseen ? '<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-sky/30 text-ink font-medium tracking-wide">NEW</span>' : ''}
              </div>
              ${u.note ? `<p class="text-sm text-ink mt-1 leading-relaxed">${u.note}</p>` : ''}
              <div class="flex flex-wrap gap-1.5 mt-2">${renderChips(u)}</div>
            </div>
          </div>
        `;
      };

      panel.innerHTML = `
        <div class="bg-white/75 backdrop-blur-sm rounded-[22px] p-5 md:p-6 shadow-soft border border-white">
          <!-- Header row -->
          <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky/50 to-sage/40 flex items-center justify-center shadow-soft relative flex-shrink-0">
                <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a6 6 0 00-6 6v3.5L4 15v1h16v-1l-2-3.5V8a6 6 0 00-6-6zm0 20a2.5 2.5 0 002.45-2h-4.9A2.5 2.5 0 0012 22z"/></svg>
                ${hasNew ? '<span class="absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full bg-peach border-2 border-white pulse-dot"></span>' : ''}
              </div>
              <div class="min-w-0">
                <p class="text-[11px] uppercase tracking-[0.25em] text-ink-3">What's new</p>
                <p class="text-sm text-ink mt-0.5 truncate">
                  ${hasNew
                    ? `<span class="font-medium">${unseen.length} new update${unseen.length > 1 ? 's' : ''}</span> · last on ${formatPushedAt(latest.pushedAt)}`
                    : `Last update on ${formatPushedAt(latest.pushedAt)}`}
                </p>
              </div>
            </div>

            <div class="flex items-center gap-2 flex-shrink-0">
              ${hasNew
                ? '<button type="button" onclick="markUpdatesSeen()" class="text-[11px] text-ink-2 hover:text-ink transition-colors px-3 py-1.5 rounded-full hover:bg-cream-3/60">Mark as read</button>'
                : ''}
              <button
                type="button"
                onclick="toggleUpdatesPanel()"
                aria-label="Toggle updates"
                class="w-8 h-8 rounded-full bg-white hover:bg-cream-2 flex items-center justify-center text-ink-2 transition-all shadow-soft border border-white"
              >
                <svg class="w-4 h-4 transition-transform ${updatesExpanded ? 'rotate-180' : ''}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Latest row (always visible) -->
          <div class="mt-4">${renderRow(latest, 0)}</div>

          <!-- Older updates (expandable) -->
          <div class="updates-body ${updatesExpanded ? 'updates-expanded' : 'updates-collapsed'}">
            ${rest.map((u, i) => renderRow(u, i + 1)).join('')}
            ${rest.length === 0 ? '' : ''}
          </div>
        </div>
      `;
    }

    function toggleUpdatesPanel() {
      updatesExpanded = !updatesExpanded;
      renderUpdatesPanel();
    }

    function markUpdatesSeen() {
      const seen = getSeenUpdateIds();
      updates.forEach((u) => seen.add(u.id));
      saveSeenUpdateIds(seen);
      renderUpdatesPanel();
    }

    /* =====================================================================
     *  READING PLAN PANEL
     *  ===================================================================== */
    let readingPlanExpanded = false;

    const allPlanDays = () => readingPlan.sections.flatMap((s) => s.days);

    // Find the reading for today — or, if today is before / after the plan,
    // return the nearest context (first day, last day, or null).
    function getPlanContext() {
      const all = allPlanDays();
      const todayIdx = all.findIndex((d) => d.date === todayKey);
      if (todayIdx !== -1) return { kind: 'today', day: all[todayIdx] };
      if (todayKey < all[0].date) return { kind: 'upcoming', day: all[0] };
      if (todayKey > all[all.length - 1].date) return { kind: 'done', day: all[all.length - 1] };
      // Today is mid-plan but the dates skipped (shouldn't happen) — grab next
      const next = all.find((d) => d.date > todayKey);
      return next ? { kind: 'upcoming', day: next } : { kind: 'done', day: all[all.length - 1] };
    }

    const DOW_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    function dowShort(iso) {
      const [y, mo, d] = iso.split('-').map(Number);
      return DOW_SHORT[new Date(y, mo - 1, d).getDay()];
    }
    function formatDateShort(iso) {
      const [y, mo, d] = iso.split('-').map(Number);
      return `${MONTH_NAMES[mo - 1].slice(0, 3)} ${d}`;
    }

    function renderReadingPlan() {
      const panel = document.getElementById('readingPlanPanel');
      const ctx = getPlanContext();

      // Featured row (always visible)
      const featured = ctx.day;
      const featuredLabel =
        ctx.kind === 'today'    ? 'Today'
      : ctx.kind === 'upcoming' ? (featured.date > todayKey ? 'Up next' : 'Starts')
      :                            'Wrapped up';

      // Build expanded body grouped by section
      const sectionsHtml = readingPlan.sections.map((sec) => {
        const rows = sec.days.map((d) => {
          const isToday  = d.date === todayKey;
          const isPast   = d.date < todayKey;
          const locked   = isLocked(d.date);
          const filled   = hasEntry(d.date);
          const canOpen  = !locked;

          const stateCls = isToday
            ? 'bg-gradient-to-r from-sky/25 to-sage/20 border border-white'
            : isPast
              ? 'bg-white/50 opacity-75'
              : 'bg-white/70';

          const interact = canOpen
            ? `onclick="openDay('${d.date}')" class="w-full text-left cursor-pointer hover:bg-white transition-colors"`
            : `class="w-full text-left cursor-not-allowed"`;

          return `
            <${canOpen ? 'button type="button"' : 'div'} ${interact}
              ${canOpen ? '' : 'aria-disabled="true"'}
              data-day-id="plan-day-${d.n}"
            >
              <div class="grid grid-cols-[auto_auto_1fr] gap-3 md:gap-4 items-center px-4 py-2.5 rounded-xl ${stateCls} border border-transparent">
                <span class="text-[11px] font-medium text-ink-3 w-8 text-right tabular-nums">${d.n}</span>
                <span class="flex items-baseline gap-1.5 min-w-[5rem]">
                  <span class="text-[13px] font-semibold text-ink tabular-nums">${formatDateShort(d.date)}</span>
                  <span class="text-[10px] uppercase tracking-widest text-ink-3">${dowShort(d.date)}</span>
                </span>
                <span class="text-[13px] text-ink-2 leading-snug">
                  ${d.reading}${d.aside ? `<span class="italic text-ink-3"> · ${d.aside}</span>` : ''}
                  ${isToday ? '<span class="ml-2 text-[10px] uppercase tracking-[0.2em] text-ink font-semibold">Today</span>' : ''}
                  ${filled ? '<span class="ml-2 inline-block w-1.5 h-1.5 rounded-full bg-gradient-to-br from-sky to-sage align-middle" title="Journaled"></span>' : ''}
                  ${locked ? '<span class="ml-2 text-[10px] uppercase tracking-[0.2em] text-ink-3">Locked</span>' : ''}
                </span>
              </div>
            </${canOpen ? 'button' : 'div'}>
          `;
        }).join('');

        return `
          <div class="mb-5 last:mb-0">
            <div class="flex items-baseline justify-between mb-2 px-1">
              <h4 class="font-serif text-lg text-ink">${sec.title}</h4>
              <span class="text-[10px] uppercase tracking-[0.25em] text-ink-3">${sec.range}</span>
            </div>
            <div class="space-y-1">${rows}</div>
          </div>
        `;
      }).join('');

      const notesHtml = readingPlan.notes.map((n) => `
        <div class="mb-3 last:mb-0">
          <p class="text-[11px] uppercase tracking-[0.25em] text-ink-3 mb-0.5">${n.title}</p>
          <p class="text-[13px] text-ink-2 leading-relaxed">${n.text}</p>
        </div>
      `).join('');

      panel.innerHTML = `
        <div class="bg-white/75 backdrop-blur-sm rounded-[22px] shadow-soft border border-white overflow-hidden">
          <!-- Header -->
          <div class="p-5 md:p-6 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sage/50 to-sky/40 flex items-center justify-center shadow-soft flex-shrink-0">
                <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h6a3 3 0 013 3v13a2 2 0 00-2-2H4V4zm16 0h-6a3 3 0 00-3 3v13a2 2 0 012-2h7V4z"/></svg>
              </div>
              <div class="min-w-0">
                <p class="text-[11px] uppercase tracking-[0.25em] text-ink-3">Expected timeline</p>
                <p class="text-sm text-ink mt-0.5 truncate">${readingPlan.title} · ${readingPlan.sections.length} sections</p>
              </div>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              ${ctx.kind !== 'done' ? `
                <button
                  type="button"
                  onclick="jumpToTodayInPlan()"
                  class="hidden md:inline-flex text-[11px] text-ink-2 hover:text-ink transition-colors px-3 py-1.5 rounded-full hover:bg-cream-3/60"
                >Jump to ${ctx.kind === 'today' ? 'today' : 'start'}</button>
              ` : ''}
              <button
                type="button"
                onclick="toggleReadingPlan()"
                aria-label="Toggle timeline"
                class="w-8 h-8 rounded-full bg-white hover:bg-cream-2 flex items-center justify-center text-ink-2 transition-all shadow-soft border border-white"
              >
                <svg class="w-4 h-4 transition-transform ${readingPlanExpanded ? 'rotate-180' : ''}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Featured "today / up next" row (always visible) -->
          <div class="px-5 md:px-6 pb-5 md:pb-6">
            ${
              isLocked(featured.date)
                ? `
                  <div class="w-full text-left p-4 rounded-2xl bg-gradient-to-r from-cream-3/70 to-cream-2 border border-white flex items-center gap-4 cursor-not-allowed">
                    <div class="flex-1 min-w-0">
                      <p class="text-[10px] uppercase tracking-[0.3em] text-ink-3">${featuredLabel} · Day ${featured.n}</p>
                      <p class="text-ink font-medium mt-0.5 truncate">${featured.reading}</p>
                      <p class="text-[11px] text-ink-3 mt-0.5">${formatDateShort(featured.date)} · ${dowShort(featured.date)}</p>
                    </div>
                    <span class="text-[10px] uppercase tracking-[0.2em] text-ink-3">Locked</span>
                  </div>
                `
                : `
                  <button
                    type="button"
                    onclick="openDay('${featured.date}')"
                    class="w-full text-left p-4 rounded-2xl bg-gradient-to-r from-sky/15 via-sage/10 to-peach/10 hover:from-sky/25 hover:via-sage/20 hover:to-peach/20 border border-white transition-all flex items-center gap-4"
                  >
                    <div class="flex-1 min-w-0">
                      <p class="text-[10px] uppercase tracking-[0.3em] text-ink-3">${featuredLabel} · Day ${featured.n}</p>
                      <p class="text-ink font-medium mt-0.5 truncate">${featured.reading}</p>
                      <p class="text-[11px] text-ink-3 mt-0.5">${formatDateShort(featured.date)} · ${dowShort(featured.date)}</p>
                    </div>
                    <svg class="w-4 h-4 text-ink-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                    </svg>
                  </button>
                `
            }
          </div>

          <!-- Expanded body -->
          <div class="${readingPlanExpanded ? 'block' : 'hidden'} border-t border-cream-3/60">
            <!-- Sections (scroll-contained) -->
            <div class="p-5 md:p-6 max-h-[70vh] overflow-y-auto">
              ${sectionsHtml}
            </div>

            <!-- Notes -->
            <div class="p-5 md:p-6 bg-cream-2/40 border-t border-cream-3/60">
              <p class="text-[11px] uppercase tracking-[0.25em] text-ink-3 mb-3">A few notes</p>
              ${notesHtml}
            </div>
          </div>
        </div>
      `;
    }

    function toggleReadingPlan() {
      readingPlanExpanded = !readingPlanExpanded;
      renderReadingPlan();
      if (readingPlanExpanded) {
        // Defer so the DOM exists, then scroll to today (or start) inside the panel
        requestAnimationFrame(() => jumpToTodayInPlan(true));
      }
    }

    function jumpToTodayInPlan(fromToggle) {
      // Expand if not already
      if (!readingPlanExpanded) {
        readingPlanExpanded = true;
        renderReadingPlan();
        requestAnimationFrame(() => jumpToTodayInPlan(true));
        return;
      }
      const ctx = getPlanContext();
      if (!ctx || !ctx.day) return;
      const target = document.querySelector(`[data-day-id="plan-day-${ctx.day.n}"]`);
      if (target) {
        target.scrollIntoView({ behavior: fromToggle ? 'auto' : 'smooth', block: 'center' });
      }
    }

    /* =====================================================================
     *  DIARY PANEL + MODAL
     *  ===================================================================== */
    let diaryExpanded = false;

    const sortedDiary = () => [...diaryEntries].sort((a, b) => (a.date < b.date ? 1 : -1));

    function previewBody(text, max = 140) {
      const oneLine = (text || '').replace(/\s+/g, ' ').trim();
      return oneLine.length > max ? oneLine.slice(0, max - 1) + '…' : oneLine;
    }

    function renderDiaryPanel() {
      const panel = document.getElementById('diaryPanel');
      const sorted = sortedDiary();

      if (sorted.length === 0) {
        // Quiet empty state — soft prompt to add the first entry.
        panel.innerHTML = `
          <div class="bg-white/70 backdrop-blur-sm rounded-[22px] p-5 md:p-6 shadow-soft border border-white">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-lavender/60 to-peach/40 flex items-center justify-center shadow-soft flex-shrink-0">
                <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V8l-5-5H5zm9 1.5L17.5 8H14V4.5z" opacity=".95"/></svg>
              </div>
              <div class="min-w-0">
                <p class="text-[11px] uppercase tracking-[0.25em] text-ink-3">Diary</p>
                <p class="text-sm text-ink mt-0.5">No entries yet — your first page is waiting.</p>
              </div>
            </div>
          </div>
        `;
        return;
      }

      const latest = sorted[0];
      const rest   = sorted.slice(1);

      const renderRow = (e, idx) => `
        <button
          type="button"
          onclick="openDiaryEntry('${e.id}')"
          class="w-full text-left px-4 py-3.5 rounded-2xl bg-white/65 hover:bg-white border border-white transition-all flex items-start gap-4 ${idx > 0 ? 'mt-2' : ''}"
        >
          <div class="flex flex-col items-center w-12 flex-shrink-0">
            <span class="text-[10px] uppercase tracking-widest text-ink-3">${dowShort(e.date)}</span>
            <span class="text-base font-semibold text-ink leading-tight tabular-nums">${e.date.split('-')[2].replace(/^0/, '')}</span>
            <span class="text-[10px] uppercase tracking-widest text-ink-3">${MONTH_NAMES[Number(e.date.split('-')[1]) - 1].slice(0, 3)}</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <h4 class="font-serif text-lg text-ink truncate">${e.title || 'Untitled'}</h4>
              ${e.mood ? `<span class="text-[10px] px-2 py-0.5 rounded-full bg-peach/30 text-ink-2 tracking-wide">${e.mood}</span>` : ''}
            </div>
            <p class="text-[13px] text-ink-2 leading-snug mt-1 line-clamp-2">${previewBody(e.body)}</p>
          </div>
          <svg class="w-4 h-4 text-ink-3 mt-1 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      `;

      panel.innerHTML = `
        <div class="bg-white/75 backdrop-blur-sm rounded-[22px] shadow-soft border border-white overflow-hidden">
          <!-- Header -->
          <div class="p-5 md:p-6 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-lavender/60 to-peach/40 flex items-center justify-center shadow-soft flex-shrink-0">
                <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V8l-5-5H5zm9 1.5L17.5 8H14V4.5z"/></svg>
              </div>
              <div class="min-w-0">
                <p class="text-[11px] uppercase tracking-[0.25em] text-ink-3">Diary</p>
                <p class="text-sm text-ink mt-0.5 truncate">
                  ${sorted.length} ${sorted.length === 1 ? 'entry' : 'entries'} · last on ${formatDateShort(latest.date)}
                </p>
              </div>
            </div>
            ${rest.length > 0 ? `
              <button
                type="button"
                onclick="toggleDiaryPanel()"
                aria-label="Toggle diary"
                class="w-8 h-8 rounded-full bg-white hover:bg-cream-2 flex items-center justify-center text-ink-2 transition-all shadow-soft border border-white flex-shrink-0"
              >
                <svg class="w-4 h-4 transition-transform ${diaryExpanded ? 'rotate-180' : ''}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>
            ` : ''}
          </div>

          <!-- Featured (latest) -->
          <div class="px-5 md:px-6 pb-5 md:pb-6">
            ${renderRow(latest, 0)}
          </div>

          ${rest.length > 0 ? `
            <div class="${diaryExpanded ? 'block' : 'hidden'} border-t border-cream-3/60 px-5 md:px-6 py-5 md:py-6 max-h-[60vh] overflow-y-auto">
              ${rest.map((e, i) => renderRow(e, i + 1)).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }

    function toggleDiaryPanel() {
      diaryExpanded = !diaryExpanded;
      renderDiaryPanel();
    }

    function openDiaryEntry(id) {
      const entry = diaryEntries.find((e) => e.id === id);
      if (!entry) return;

      const [y, mo, d] = entry.date.split('-').map(Number);
      const dateObj = new Date(y, mo - 1, d);

      document.getElementById('diaryModalDayName').textContent = DAY_NAMES[dateObj.getDay()];
      document.getElementById('diaryModalDate').textContent    = `${MONTH_NAMES[mo - 1]} ${d}, ${y}`;
      document.getElementById('diaryModalTitle').textContent   = entry.title || 'Untitled';
      document.getElementById('diaryModalBody').textContent    = entry.body || '';

      const moodEl = document.getElementById('diaryModalMood');
      if (entry.mood) {
        moodEl.textContent = entry.mood;
        moodEl.classList.remove('hidden');
      } else {
        moodEl.classList.add('hidden');
      }

      const bd = document.getElementById('diaryModalBackdrop');
      bd.classList.remove('hidden');
      bd.scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeDiaryModal() {
      document.getElementById('diaryModalBackdrop').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function closeDiaryBackdrop(e) {
      if (e.target.id === 'diaryModalBackdrop') closeDiaryModal();
    }

    /* =====================================================================
     *  HOME VIEW — month cards with mini calendar previews
     *  ===================================================================== */
    function renderMonthCards() {
      const grid = document.getElementById('monthGrid');
      grid.innerHTML = months.map((m, i) => {
        const updated   = countMonthEntries(m);
        const available = countMonthAvailable(m);
        const pct       = available > 0 ? (updated / available) * 100 : 0;
        return `
          <button
            onclick="showMonth(${i})"
            class="month-card group text-left bg-white/75 backdrop-blur-sm rounded-[24px] p-6 shadow-soft hover:shadow-soft-lg border border-white overflow-hidden relative"
          >
            <div class="absolute inset-0 bg-gradient-to-br ${m.gradient} opacity-70 pointer-events-none"></div>
            <div class="relative">
              <div class="flex items-start justify-between mb-4">
                <div>
                  <p class="text-[10px] uppercase tracking-[0.3em] text-ink-3">Month ${i + 1}</p>
                  <h3 class="font-serif text-[2rem] leading-none font-semibold text-ink mt-1">${m.name}</h3>
                </div>
                <span class="text-[10px] text-ink-2 uppercase tracking-[0.25em] mt-1.5">${m.word}</span>
              </div>

              <!-- Mini calendar -->
              <div id="mini-cal-${i}" class="grid grid-cols-7 gap-[3px] mb-5"></div>

              <!-- Progress -->
              <div class="flex items-center justify-between">
                <span class="text-[11px] text-ink-2">${updated}/${available} days</span>
                <div class="flex-1 mx-3 h-[5px] bg-white/70 rounded-full overflow-hidden">
                  <div class="h-full bg-gradient-to-r from-sky to-sage progress-bar-fill rounded-full" style="width:${pct}%"></div>
                </div>
                <span class="text-[11px] font-medium text-ink">${Math.round(pct)}%</span>
              </div>
            </div>
          </button>
        `;
      }).join('');

      // Mini calendar dots for each card
      months.forEach((m, i) => {
        const mini = document.getElementById(`mini-cal-${i}`);
        const firstDay = new Date(m.year, m.month, 1).getDay();
        let html = '';
        for (let d = 0; d < firstDay; d++) html += `<div></div>`;
        for (let d = 1; d <= m.days; d++) {
          const key    = dateKey(m.year, m.month, d);
          const filled = hasEntry(key);
          const locked = isLocked(key);
          const cls = locked
            ? 'bg-transparent border border-dashed border-ink-3/40'
            : filled
              ? 'bg-gradient-to-br from-sky to-sage shadow-[0_0_0_1px_rgba(255,255,255,0.6)]'
              : 'bg-white/60 border border-white';
          html += `<div class="mini-day rounded-full ${cls}"></div>`;
        }
        mini.innerHTML = html;
      });
    }

    /* =====================================================================
     *  VIEW SWITCHING
     *  ===================================================================== */
    function showHome() {
      document.getElementById('homeView').classList.remove('hidden');
      document.getElementById('calendarView').classList.add('hidden');
      document.getElementById('homeView').classList.remove('fade-in-up');
      void document.getElementById('homeView').offsetWidth; // force reflow to replay animation
      document.getElementById('homeView').classList.add('fade-in-up');
      renderUpdatesPanel();
      renderReadingPlan();
      renderDiaryPanel();
      renderMonthCards();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showMonth(index) {
      const m = months[index];
      document.getElementById('homeView').classList.add('hidden');
      const view = document.getElementById('calendarView');
      view.classList.remove('hidden');
      view.classList.remove('fade-in-up');
      void view.offsetWidth;
      view.classList.add('fade-in-up');

      document.getElementById('calMonthEyebrow').textContent = m.word;
      document.getElementById('calMonthTitle').textContent = `${m.name} ${m.year}`;
      const updated   = countMonthEntries(m);
      const available = countMonthAvailable(m);
      document.getElementById('calMonthProgress').textContent = `${updated}/${available} days updated`;

      const grid = document.getElementById('calendarGrid');
      const firstDay = new Date(m.year, m.month, 1).getDay();
      let html = '';
      for (let d = 0; d < firstDay; d++) html += `<div></div>`;
      for (let d = 1; d <= m.days; d++) {
        const key     = dateKey(m.year, m.month, d);
        const filled  = hasEntry(key);
        const locked  = isLocked(key);
        const isToday = key === todayKey;

        if (locked) {
          html += `
            <div
              class="day-cell rounded-2xl bg-white/30 border border-dashed border-ink-3/30 flex flex-col items-center justify-center relative cursor-not-allowed select-none"
              aria-label="${m.name} ${d} — unavailable"
              title="Unavailable"
            >
              <span class="text-base md:text-lg font-light text-ink-3/60 line-through">${d}</span>
              <svg class="absolute bottom-1.5 md:bottom-2 w-3 h-3 text-ink-3/60" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="9" rx="2"/>
                <path d="M8 11V8a4 4 0 118 0v3" stroke-linecap="round"/>
              </svg>
            </div>`;
        } else {
          html += `
            <button
              onclick="openDay('${key}')"
              class="day-cell rounded-2xl bg-white/70 hover:bg-white border border-white flex flex-col items-center justify-center relative shadow-soft ${filled ? 'has-entry' : ''} ${isToday ? 'is-today' : ''}"
              aria-label="${m.name} ${d}"
            >
              <span class="text-base md:text-lg font-medium text-ink">${d}</span>
              ${filled
                ? '<span class="absolute bottom-1.5 md:bottom-2 w-1.5 h-1.5 rounded-full bg-gradient-to-br from-sky to-sage"></span>'
                : ''}
            </button>`;
        }
      }
      grid.innerHTML = html;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* =====================================================================
     *  MODAL — flashcard
     *  ===================================================================== */
    let modalCurrentKey = null;

    /* ---------- Photo carousel state ---------- */
    let modalPhotos = [];
    let modalPhotoIdx = 0;

    function setModalPhotos(photo) {
      // Accept string, array, or undefined.
      if (Array.isArray(photo))      modalPhotos = photo.filter(Boolean);
      else if (typeof photo === 'string' && photo) modalPhotos = [photo];
      else                            modalPhotos = [];
      modalPhotoIdx = 0;
      renderModalPhoto();
    }

    function renderModalPhoto() {
      const img   = document.getElementById('modalPhoto');
      const ph    = document.getElementById('modalPhotoPlaceholder');
      const prev  = document.getElementById('modalPhotoPrev');
      const next  = document.getElementById('modalPhotoNext');
      const dots  = document.getElementById('modalPhotoDots');
      const count = document.getElementById('modalPhotoCount');

      // Helpers to toggle visibility (Tailwind hidden + flex)
      const show = (el, displayClass = 'flex') => { el.classList.remove('hidden'); el.classList.add(displayClass); };
      const hide = (el)                          => { el.classList.add('hidden'); el.classList.remove('flex'); };

      if (modalPhotos.length === 0) {
        hide(img);
        show(ph);
        hide(prev); hide(next); hide(dots); hide(count);
        return;
      }

      hide(ph);
      img.src = modalPhotos[modalPhotoIdx];
      show(img, 'block');

      if (modalPhotos.length > 1) {
        show(prev); show(next); show(dots); show(count);
        count.textContent = `${modalPhotoIdx + 1} / ${modalPhotos.length}`;
        dots.innerHTML = modalPhotos.map((_, i) => `
          <button type="button" onmousedown="event.preventDefault()" onclick="modalPhotoGo(${i})"
            aria-label="Go to photo ${i + 1}"
            class="rounded-full transition-all ${i === modalPhotoIdx ? 'bg-white w-4 h-1.5' : 'bg-white/60 hover:bg-white/80 w-1.5 h-1.5'}"></button>
        `).join('');
      } else {
        hide(prev); hide(next); hide(dots); hide(count);
      }
    }

    function modalPhotoNav(dir) {
      if (modalPhotos.length === 0) return;
      modalPhotoIdx = (modalPhotoIdx + dir + modalPhotos.length) % modalPhotos.length;
      renderModalPhoto();
    }
    function modalPhotoGo(idx) {
      if (idx < 0 || idx >= modalPhotos.length) return;
      modalPhotoIdx = idx;
      renderModalPhoto();
    }

    function openDay(key) {
      if (isLocked(key)) return;
      modalCurrentKey = key;
      const [y, mo, d] = key.split('-').map(Number);
      const dateObj = new Date(y, mo - 1, d);

      document.getElementById('modalDayName').textContent = DAY_NAMES[dateObj.getDay()];
      document.getElementById('modalDate').textContent = `${MONTH_NAMES[mo - 1]} ${d}`;

      const entry = journeyEntries[key];
      const statusEl = document.getElementById('modalStatus');

      if (entry) {
        statusEl.textContent = 'Updated';
        statusEl.className = 'inline-block mb-6 px-3 py-1 text-[11px] rounded-full bg-sage/45 text-ink tracking-wide';
        document.getElementById('modalWhatIDid').textContent     = entry.whatIDid     || '—';
        document.getElementById('modalWhatILearned').textContent = entry.whatILearned || '—';
        document.getElementById('modalNote').textContent         = entry.note         || '—';
        setModalPhotos(entry.photo);
      } else {
        statusEl.textContent = 'Not updated yet';
        statusEl.className = 'inline-block mb-6 px-3 py-1 text-[11px] rounded-full bg-peach/40 text-ink-2 tracking-wide';
        document.getElementById('modalWhatIDid').textContent     = '—';
        document.getElementById('modalWhatILearned').textContent = '—';
        document.getElementById('modalNote').textContent         = '—';
        setModalPhotos(null);
      }

      // Always start on the front side
      const flip = document.getElementById('flipCard');
      flip.classList.remove('flipped');
      // Reset both face bodies' scroll positions so nothing carries over.
      flip.querySelectorAll('.flip-card-body').forEach((el) => { el.scrollTop = 0; });

      const bd = document.getElementById('modalBackdrop');
      bd.classList.remove('hidden');
      bd.scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const bd = document.getElementById('modalBackdrop');
      bd.classList.add('hidden');
      document.body.style.overflow = '';
    }

    function closeModalBackdrop(e) {
      if (e.target.id === 'modalBackdrop') closeModal();
    }

    function flipCard(e) {
      if (e && e.preventDefault) e.preventDefault();
      const card = document.getElementById('flipCard');
      // Drop focus FIRST so the browser has nothing to scroll into view.
      if (document.activeElement && document.activeElement.blur) {
        document.activeElement.blur();
      }
      // Reset scroll on both the backdrop and both face bodies — guarantees
      // the next side always starts at the top, cleanly centered.
      const bd = document.getElementById('modalBackdrop');
      if (bd) bd.scrollTop = 0;
      card.querySelectorAll('.flip-card-body').forEach((el) => { el.scrollTop = 0; });
      card.classList.toggle('flipped');
    }

    /* =====================================================================
     *  KEYBOARD
     *  ===================================================================== */
    document.addEventListener('keydown', (e) => {
      const dayModalOpen   = !document.getElementById('modalBackdrop').classList.contains('hidden');
      const diaryModalOpen = !document.getElementById('diaryModalBackdrop').classList.contains('hidden');
      if (!dayModalOpen && !diaryModalOpen) return;
      if (e.key === 'Escape') {
        if (diaryModalOpen) closeDiaryModal();
        else closeModal();
      }
      if (dayModalOpen && (e.key === ' ' || e.key === 'Enter')) { e.preventDefault(); flipCard(e); }
      // Arrow keys cycle photos when the card is showing the back side.
      if (dayModalOpen && document.getElementById('flipCard').classList.contains('flipped')) {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); modalPhotoNav(-1); }
        if (e.key === 'ArrowRight') { e.preventDefault(); modalPhotoNav(1); }
      }
    });

    /* =====================================================================
     *  INIT
     *  ===================================================================== */
    renderUpdatesPanel();
    renderReadingPlan();
    renderDiaryPanel();
    renderMonthCards();
    updateProgress();
  </script>
</body>
</html>
